services:
  postgres:
    image: postgres:17-alpine
    container_name: api-starter-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-api_starter}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-api_starter}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
